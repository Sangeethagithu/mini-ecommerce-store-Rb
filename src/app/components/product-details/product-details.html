<div class="product-page" *ngIf="product">

    <div class="breadcrumb">

        Home /

        Products /

        {{product.name}}

    </div>

    <div class="product-container">

        <div class="image-section">

            <img

                [src]="'https://localhost:7113/images/' + product.imageUrl"

                onerror="this.src='https://via.placeholder.com/450'">

        </div>

        <div class="details-section">

            <h1>

                {{product.name}}

            </h1>

            <p class="description">

                {{product.description}}

            </p>

            <div class="price">

                ₹{{product.price | number}}

            </div>

            <div
                class="stock"
                [class.low-stock]="product.stockQuantity<10">

                <span>

                    In Stock

                </span>

                ({{product.stockQuantity}} Available)

            </div>

            <hr>

            <div class="features">

                <p>✔ Genuine Product</p>

                <p>✔ Secure Payment</p>

                <p>✔ Fast Delivery</p>

                <p>✔ Easy Returns</p>

            </div>

            <button

                class="cart-btn"

                (click)="addToCart()">

                🛒 Add To Cart

            </button>

        </div>

    </div>

</div>
