<div *ngIf="product">

  <h1>
    {{ product.name }}
  </h1>

<img
  [src]="'https://localhost:7113/images/' + product.imageUrl"
  width="300"
  onerror="this.src='https://via.placeholder.com/300'">

  <h2>
    ₹{{ product.price }}
  </h2>

  <p>
    {{ product.description }}
  </p>

  <p>
    Stock:
    {{ product.stockQuantity }}
  </p>

  <button
    (click)="addToCart()">
    Add To Cart
  </button>

</div>
