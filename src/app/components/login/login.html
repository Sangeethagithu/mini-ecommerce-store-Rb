<form (ngSubmit)="login()">

<div class="auth-container">

  <h1 class="logo">
    AmazonMini
  </h1>

  <h2>Sign In</h2>

  <label>Email</label>

  <input
    type="email"
    [(ngModel)]="email"
    name="email">

  <br><br>

  <label>Password</label>


<div class="password-container">

  <input
    [type]="showPassword ? 'text' : 'password'"
    [(ngModel)]="password"
    name="password">

  <button
    class="eye-btn"
    type="button"
    (click)="togglePassword()">

    👁

  </button>

</div>
<br>
<p>
 <a routerLink="/forgot-password">
  Forgot Password?
</a>
</p>
  <br>

  <button type="submit">
    Login
  </button>

  <hr>

  <p>
    New to AmazonMini?
  </p>

  <button
    type="button"
    routerLink="/register">

    Create Account →

  </button>

</div>

</form>
