<div class="cart-page">

  <h1 class="page-title">Shopping Cart</h1>

  <div *ngIf="items.length === 0" class="empty-cart">

    <div class="empty-card">

      <div class="cart-icon">🛒</div>

      <h2>Your Cart is Empty</h2>

      <p>Add some products and come back here.</p>

<button
  class="shop-btn"
  (click)="goToProducts()">
  Continue Shopping
</button>

    </div>

  </div>

  <div
    *ngIf="items.length > 0"
    class="cart-layout">

    <div class="cart-items">

      <div
        class="cart-item"
        *ngFor="let item of items">

        <div class="item-details">

          <h3>{{ item.productName }}</h3>

          <p class="price">
            ₹{{ item.price }}
          </p>

          <div class="quantity-controls">

            <button (click)="decreaseQuantity(item)">
              -
            </button>

            <span>{{ item.quantity }}</span>

            <button (click)="increaseQuantity(item)">
              +
            </button>

            <button
              class="remove-btn"
              (click)="removeItem(item)">

              🗑️

            </button>

          </div>

          <p class="subtotal">
            Item Total: ₹{{ item.price * item.quantity }}
          </p>

        </div>

      </div>

    </div>

    <div class="summary">

      <h2>Order Summary</h2>

      <div class="summary-row">
        <span>Total Items</span>
        <span>{{ items.length }}</span>
      </div>

      <div class="summary-row">
        <span>Subtotal</span>
        <span>₹{{ total }}</span>
      </div>

      <hr>

      <div class="summary-total">
        <span>Total</span>
        <span>₹{{ total }}</span>
      </div>

      <div class="action-buttons">

  <button
    class="checkout-btn"
    (click)="checkout()">
    Proceed to Checkout
  </button>

  <button
    class="orders-btn"
    (click)="goToOrders()">
    View Orders
  </button>

</div>
    </div>

  </div>

</div>
