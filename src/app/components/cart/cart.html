<h1>Shopping Cart</h1>

<div *ngIf="items.length === 0">

  <h2>
    Your Cart is Empty
  </h2>

  <a href="/products">
    Continue Shopping
  </a>

</div>

<div *ngIf="items.length > 0">

  <div
    class="cart-item"
    *ngFor="let item of items">

    <div class="item-details">

      <h3>
        {{ item.productName }}
      </h3>

      <p>
        Price: ₹{{ item.price }}
      </p>

     <div class="quantity-controls">

  <button
    (click)="decreaseQuantity(item)">

    -

  </button>
  <button
  class="remove-btn"
  (click)="removeItem(item)">

    🗑️

</button>

  <span>

    {{ item.quantity }}

  </span>

  <button
    (click)="increaseQuantity(item)">

    +

  </button>

</div>
      <p class="subtotal">

        Item Total:
        ₹{{ item.price * item.quantity }}

      </p>

    </div>

  </div>

  <div class="summary">

    <h2>
      Order Summary
    </h2>

    <p>
      Total Items:
      {{ items.length }}
    </p>

    <h3>
      Total:
      ₹{{ total }}
    </h3>

    <button
      class="checkout-btn"
      (click)="checkout()">

      Proceed to Checkout

    </button>

    <br><br>

    <a href="/orders">
      View Orders
    </a>

  </div>

</div>
