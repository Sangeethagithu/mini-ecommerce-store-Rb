<h2>My Cart</h2>

<p>Total Items: {{ items.length }}</p>

<div *ngFor="let item of items">

  <h3>{{ item.productName }}</h3>

  <p>Price: ₹{{ item.price }}</p>

  <p>Quantity: {{ item.quantity }}</p>

  <hr>

</div>

<hr>

<h3>
  Total: ₹{{ total }}
</h3>

<button (click)="checkout()">
  Checkout
</button>
<br>
<br>

<a href="/orders">
  View Orders
</a>
