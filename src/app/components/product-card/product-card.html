<div class="product-card">

  <img
    [src]="'https://localhost:7113/images/' + product.imageUrl"
    class="product-image">

  <h3>

    <a
      [routerLink]="[
        '/product-details',
        product.id
      ]">

      {{ product.name }}

    </a>

  </h3>

  <p class="description">

    {{ product.description }}

  </p>

  <p class="price">

    ₹{{ product.price }}

  </p>

  <p>

    Stock:
    {{ product.stockQuantity }}

  </p>

 <button
  class="cart-btn"
  (click)="onAddToCart()">

  Add To Cart

</button>
</div>
